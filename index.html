<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>到期提醒 - shelf-life</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; line-height: 1.65; margin: 0; padding: 0; }
      header { padding: 28px 18px 10px; border-bottom: 1px solid rgba(127,127,127,.25); }
      main { padding: 18px; max-width: 860px; margin: 0 auto; }
      h1 { font-size: 22px; margin: 0 0 6px; }
      h2 { font-size: 16px; margin: 22px 0 10px; }
      p, li { font-size: 14px; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .muted { opacity: .8; }
      .box { border: 1px solid rgba(127,127,127,.25); border-radius: 10px; padding: 12px 14px; }
      a { word-break: break-word; }
    </style>
  </head>
  <body>
    <header>
      <div style="max-width:860px;margin:0 auto;">
        <h1>到期提醒 - shelf-life</h1>
      </div>
